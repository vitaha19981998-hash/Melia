<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мої моделі - Melia 3D</title>
<style>
  :root{ --bg:#0f1117; --accent:#4f8cff; --card:#171b24; }
  html,body{ height:100%; margin:0; font-family:Segoe UI, sans-serif; background: var(--bg); color:#fff; }
  .hero{
    min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:80px 20px;
    background: linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.55)), url('image/Fon_Melia3d.png') center/cover no-repeat;
  }
  .wrap{ max-width:1100px; width:100%; text-align:center; }
  h1{ font-size:42px; margin-bottom:18px; }
  .grid{ display:flex; gap:24px; justify-content:center; align-items:center; }
  .card{ width:300px; height:300px; background:var(--card); border-radius:12px; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .card img{ width:100%; height:100%; object-fit:cover; display:block; }
  .back{ position:fixed; top:16px; left:16px; background:rgba(0,0,0,0.6); color:#fff; padding:8px 12px; border-radius:8px; text-decoration:none; }
  @media(max-width:900px){ .grid{ flex-direction:column; } .card{ width:88%; height:220px; } }
</style>
</head>
<body>
  <a class="back" href="index.html">← Назад</a>
  <section class="hero">
    <div class="wrap">
      <h1>Мої моделі</h1>
      <p style="color:#cfcfcf; max-width:800px; margin:0 auto 30px;">Тут ви можете додавати свої роботи. Нижче шаблон на 3 фото.</p>
      <div class="grid">
        <div class="card"><img src="image/work1.jpg" alt="Робота 1" loading="lazy"></div>
        <div class="card"><img src="image/work2.jpg" alt="Робота 2" loading="lazy"></div>
        <div class="card"><img src="image/work3.jpg" alt="Робота 3" loading="lazy"></div>
      </div>
    </div>
  </section>
</body>
</html>
