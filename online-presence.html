<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Online counter (Gun)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    #online-badge{
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 6px 10px;
      border-radius: 12px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      z-index: 9999;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <div id="online-badge">Online 0</div>

  <script src="https://cdn.jsdelivr.net/npm/gun/gun.min.js"></script>
  <script>
    const badge = document.getElementById('online-badge');

    // Use public Gun relay peers (no account/server required). You can add more peers if needed.
    const gun = Gun({ peers: ['https://gun-manhattan.herokuapp.com/gun'] });

    // Namespace presence by hostname+pathname so the counter is per-site/page
    const siteKey = 'site-presence:' + location.hostname + location.pathname;
    const presence = gun.get(siteKey);

    const clientId = Math.random().toString(36).slice(2);
    const HEARTBEAT_MS = 5000; // announce interval
    const STALE_MS = 20000;    // consider offline after this inactivity

    let heartbeat = null;

    function announce() {
      try { presence.get(clientId).put({ ts: Date.now() }); } catch (e) { /* ignore */ }
    }

    function startHeartbeat() {
      if (heartbeat) return;
      announce();
      heartbeat = setInterval(announce, HEARTBEAT_MS);
    }

    function stopHeartbeat() {
      if (!heartbeat) return;
      clearInterval(heartbeat);
      heartbeat = null;
    }

    // Start when page is visible
    if (document.visibilityState === 'visible') startHeartbeat();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') startHeartbeat();
      else stopHeartbeat();
    });

    // Try to remove on unload/pagehide
    function removePresence() {
      try { presence.get(clientId).put(null); } catch(e) {}
    }
    window.addEventListener('pagehide', () => { removePresence(); stopHeartbeat(); });
    window.addEventListener('beforeunload', () => { removePresence(); stopHeartbeat(); });

    const active = {};

    function refreshCount() {
      const now = Date.now();
      let count = 0;
      for (const k in active) {
        if (active[k] && active[k].ts && (now - active[k].ts <= STALE_MS)) count++;
      }
      badge.textContent = `Online ${count}`;
    }

    // Listen for presence map changes
    presence.map().on((data, key) => {
      if (!data) {
        delete active[key];
      } else if (data.ts) {
        active[key] = data;
      }
      refreshCount();
    });

    // Periodic cleanup in case events are missed
    setInterval(() => {
      const now = Date.now();
      let removed = false;
      for (const k in active) {
        if (!active[k] || !active[k].ts || (now - active[k].ts > STALE_MS)) { delete active[k]; removed = true; }
      }
      if (removed) refreshCount();
    }, HEARTBEAT_MS);

    // Ensure heartbeat starts even if script ran after visibility change
    // (already handled) and attempt initial start
    startHeartbeat();
  </script>
</body>
</html>
